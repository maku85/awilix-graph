name: Bug report
description: Something isn't working as expected
labels: [bug]

body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal command or code to trigger the bug.
      placeholder: |
        awilix-graph -c src/container.ts -f mermaid
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: awilix-graph version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.0.0"
    validations:
      required: true

  - type: input
    id: awilix
    attributes:
      label: awilix version
      placeholder: "10.0.0"
    validations:
      required: true
